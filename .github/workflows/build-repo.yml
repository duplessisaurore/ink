name: Build Arch Repository

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Arch Build Environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            sudo \
            rust \
            cargo

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          mkdir -p /home/builder/.cargo
          chown -R builder:builder /home/builder
          chown -R builder:builder .

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            /home/builder/.cargo/registry
            /home/builder/.cargo/git
            /home/builder/.cargo/bin
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build Packages
        run: |
          su builder -c "
            export CARGO_HOME=/home/builder/.cargo

            cd pkgbuilds/ink-quark3
            makepkg -s --noconfirm

            cd ../ink-quark3-disasm
            makepkg -s --noconfirm

            cd ../ink-lepton3
            makepkg -s --noconfirm

            cd ../ink-blueprint
            makepkg -s --noconfirm

            cd ../ink-typewriter
            makepkg -s --noconfirm
          "

      - name: Create Repository
        run: |
          mkdir -p repo

          find pkgbuilds -name "*.pkg.tar.zst" -exec cp {} repo/ \;
          find pkgbuilds -name "*.pkg.tar.zst.sig" -exec cp {} repo/ \; || true

          cd repo

          repo-add ink.db.tar.gz *.pkg.tar.zst

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          cname: ink.sudlicht.com